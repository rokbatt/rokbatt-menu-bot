name: Send Meal Menu

on:
  repository_dispatch:
    types: [send-breakfast, send-lunch, send-dinner]
  workflow_dispatch:
    inputs:
      meal_type:
        description: "테스트 식사 선택 (아침/점심/저녁)"
        required: true
        default: "점심"

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: 식사 타입 결정
        id: meal
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.meal_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.action }}" = "send-breakfast" ]; then
            echo "type=아침" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.action }}" = "send-lunch" ]; then
            echo "type=점심" >> $GITHUB_OUTPUT
          else
            echo "type=저녁" >> $GITHUB_OUTPUT
          fi

      - name: 메뉴 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEAL_TYPE: ${{ steps.meal.outputs.type }}
        run: python send_menu.py

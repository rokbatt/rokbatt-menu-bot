<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKBATT 식단표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .badge {
    display: inline-block;
    background: #1e3a5f;
    color: #60a5fa;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.02em;
  }

  .date-display {
    margin-top: 6px;
    font-size: 14px;
    color: #94a3b8;
  }

  .meals {
    max-width: 440px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .meal-card {
    background: #1a1f2e;
    border: 1px solid #2a3045;
    border-radius: 14px;
    overflow: hidden;
  }

  .meal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px 12px;
    border-bottom: 1px solid #2a3045;
  }

  .meal-emoji { font-size: 20px; }

  .meal-title {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
  }

  .meal-time {
    margin-left: auto;
    font-size: 12px;
    color: #64748b;
  }

  .meal-items {
    padding: 14px 18px;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .meal-items li {
    font-size: 14px;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .meal-items li::before {
    content: '';
    width: 5px;
    height: 5px;
    background: #3b82f6;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .no-data {
    text-align: center;
    padding: 60px 20px;
    color: #475569;
  }

  .no-data .icon { font-size: 40px; margin-bottom: 12px; }
  .no-data p { font-size: 15px; }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: #334155;
  }
</style>
</head>
<body>

<header>
  <div class="badge">🇰🇷 ROKBATT · UNIFIL</div>
  <h1>오늘의 식단표</h1>
  <div class="date-display" id="date-display">—</div>
</header>

<div class="meals" id="meals-container">
  <div class="no-data">
    <div class="icon">⏳</div>
    <p>식단 정보를 불러오는 중...</p>
  </div>
</div>

<footer>ROKBATT 급양 자동화 시스템</footer>

<script>
const MENU_RAW_URL = "https://raw.githubusercontent.com/sunghyun0528/rokbatt-menu-bot/main/menu.txt";

const MEAL_CONFIG = {
  "아침": { emoji: "🌅", time: "06:30" },
  "점심": { emoji: "☀️", time: "12:00" },
  "저녁": { emoji: "🌙", time: "18:00" },
};

function getTargetDate() {
  const params = new URLSearchParams(window.location.search);
  return params.get("date") || new Date().toISOString().split("T")[0];
}

function parseMenu(text) {
  const menu = {};
  let currentDate = null;
  for (const raw of text.split("\n")) {
    const line = raw.trim();
    if (!line) continue;
    if (line.length === 10 && line[4] === "-" && line[7] === "-") {
      currentDate = line;
      menu[currentDate] = {};
    } else if (currentDate && line.includes(":")) {
      const [meal, ...rest] = line.split(":");
      const mealName = meal.trim();
      if (["아침", "점심", "저녁"].includes(mealName)) {
        menu[currentDate][mealName] = rest.join(":").trim();
      }
    }
  }
  return menu;
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split("-");
  const days = ["일", "월", "화", "수", "목", "금", "토"];
  const day = days[new Date(dateStr).getDay()];
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 (${day})`;
}

async function render() {
  const targetDate = getTargetDate();
  document.getElementById("date-display").textContent = formatDate(targetDate);

  let text;
  try {
    const res = await fetch(MENU_RAW_URL + "?t=" + Date.now());
    text = await res.text();
  } catch {
    document.getElementById("meals-container").innerHTML = `
      <div class="no-data">
        <div class="icon">⚠️</div>
        <p>식단 데이터를 불러오지 못했습니다</p>
      </div>`;
    return;
  }

  const menu = parseMenu(text);
  const dayMenu = menu[targetDate];

  if (!dayMenu || Object.keys(dayMenu).length === 0) {
    document.getElementById("meals-container").innerHTML = `
      <div class="no-data">
        <div class="icon">📭</div>
        <p>${targetDate} 식단 정보가 없습니다</p>
      </div>`;
    return;
  }

  const html = ["아침", "점심", "저녁"].map(meal => {
    if (!dayMenu[meal]) return "";
    const { emoji, time } = MEAL_CONFIG[meal];
    const items = dayMenu[meal].split(",").map(i => i.trim()).filter(Boolean);
    const liItems = items.map(i => `<li>${i}</li>`).join("");
    return `
      <div class="meal-card">
        <div class="meal-header">
          <span class="meal-emoji">${emoji}</span>
          <span class="meal-title">${meal}</span>
          <span class="meal-time">${time}</span>
        </div>
        <ul class="meal-items">${liItems}</ul>
      </div>`;
  }).join("");

  document.getElementById("meals-container").innerHTML = html;
}

render();
</script>
</body>
</html>
